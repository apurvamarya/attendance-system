<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Login · FaceTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --surface: #11141a;
            --border: rgba(255,255,255,0.07);
            --accent: #00e5a0;
            --text: #e8eaf0;
            --muted: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Glow blob */
        body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0,229,160,0.06) 0%, transparent 70%);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .login-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent), #6c63ff);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 16px;
        }

        .brand-name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 26px;
            letter-spacing: -0.5px;
        }

        .brand-name span { color: var(--accent); }

        .brand-sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.5px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .field input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,229,160,0.08);
        }

        .field input::placeholder { color: var(--muted); }

        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: #0a0c10;
            border: none;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 15px;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 8px;
            letter-spacing: 0.3px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .submit-btn:hover { opacity: 0.9; }
        .submit-btn:active { transform: scale(0.99); }

        .error {
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.2);
            color: #ff6b6b;
            font-size: 12px;
            font-family: 'DM Mono', monospace;
            padding: 10px 14px;
            border-radius: 8px;
            margin-top: 14px;
            text-align: center;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            margin-top: 20px;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="brand">
        <div class="brand-icon">👁</div>
        <div class="brand-name">Face<span>Track</span></div>
        <div class="brand-sub">ATTENDANCE SYSTEM</div>
    </div>

    <div class="card">
        <form method="POST">
            <div class="field">
                <label>Username</label>
                <input type="text" name="username" value="admin" placeholder="Enter username" required>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" value="admin123" placeholder="Enter password" required>
            </div>
            <button type="submit" class="submit-btn">Sign In →</button>

            {% if error %}
                <div class="error">⚠ {{ error }}</div>
            {% endif %}
        </form>
    </div>

    <div class="footer-note">Secure · Academic Use Only</div>
</div>
</body>
</html>
